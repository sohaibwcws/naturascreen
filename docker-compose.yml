# NaturaScreen — local development stack.
# `make up` brings up Postgres, Redis, the FastAPI API, the Celery worker, and the
# Next.js web app. Scientific tooling (Vina, MHCflurry, XGBoost models) is fetched
# into the worker image on demand via the `make data-*` targets; absence of a tool
# yields an explicit `unavailable` status from the API, never a fabricated result.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-naturascreen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-naturascreen}
      POSTGRES_DB: ${POSTGRES_DB:-naturascreen}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-naturascreen}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    command: uvicorn naturascreen.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    env_file: .env
    volumes:
      - ./api:/app
      - simdata:/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./api
    command: celery -A naturascreen.tasks.celery_app worker --loglevel=INFO
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    env_file: .env
    volumes:
      - ./api:/app
      - simdata:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./web
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
      NEXT_PUBLIC_WS_BASE: ${NEXT_PUBLIC_WS_BASE:-ws://localhost:8000}
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  simdata:
